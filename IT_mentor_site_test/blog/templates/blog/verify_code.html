<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение регистрации</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 32px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background:
                linear-gradient(rgba(247, 247, 249, 0.9), rgba(247, 247, 249, 0.9)),
                url("{% static 'images/2.jpg' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #151515;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 28px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
            padding: 28px;
            backdrop-filter: blur(8px);
        }

        .title {
            font-size: clamp(28px, 4vw, 38px);
            line-height: 1.05;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: -0.03em;
        }

        .description {
            font-size: 18px;
            line-height: 1.45;
            color: #303030;
            margin-bottom: 18px;
        }

        .error {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(203, 59, 59, 0.1);
            color: #b3261e;
            font-size: 15px;
            line-height: 1.4;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .input {
            width: 100%;
            min-width: 0;
            height: 56px;
            padding: 0 18px;
            border: 2px solid #1c1c1c;
            border-radius: 14px;
            background: #fff;
            font-size: 18px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input:focus {
            border-color: #de7358;
            box-shadow: 0 0 0 4px rgba(222, 115, 88, 0.18);
        }

        .submit-btn {
            width: 100%;
            min-height: 56px;
            border: none;
            border-radius: 14px;
            background: #de7358;
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 24px rgba(222, 115, 88, 0.24);
        }

        .submit-btn:hover {
            background: #cb6248;
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 520px) {
            body {
                padding: 16px;
            }

            .card {
                padding: 22px 18px;
                border-radius: 22px;
            }

            .description {
                font-size: 16px;
            }

            .input,
            .submit-btn {
                height: 52px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">Подтверждение регистрации</h1>
        <p class="description">На ваш email отправлен четырёхзначный код. Введите его ниже, чтобы завершить регистрацию.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input class="input" type="text" name="code" inputmode="numeric" autocomplete="one-time-code" placeholder="Код подтверждения" required>
            <button class="submit-btn" type="submit">Подтвердить</button>
        </form>
    </div>
</body>
</html>
