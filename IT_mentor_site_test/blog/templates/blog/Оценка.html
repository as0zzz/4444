{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оценка встречи | IT-mentor</title>
    <style>
        /* Базовые переменные из твоего проекта */
        :root {
            --accent: #DE7358;
            --bg-light: #F3F4F6;
            --text-dark: #000000;
            --text-light: #FFFFFF;
            --border-color: #D1D5DB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .review-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1.875rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            max-width: 40rem;
            width: 100%;
            text-align: center;
        }

        .review-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .review-subtitle {
            color: #6B7280;
            margin-bottom: 2rem;
        }

        /* Контейнер 10-балльной шкалы */
        .rating-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .rating-btn {
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: transparent;
            color: var(--text-dark);
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Состояния при наведении и клике */
        .rating-btn.hovered {
            border-color: var(--accent);
            background-color: #FDF2F0; /* Светлый оттенок акцентного цвета */
            color: var(--accent);
        }

        .rating-btn.active {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Поле комментария */
        .comment-area {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            resize: vertical;
            outline: none;
        }

        .comment-area:focus {
            border-color: var(--accent);
        }

        /* Кнопка отправки */
        .submit-btn {
            background-color: var(--accent);
            color: white;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1.125rem;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        .submit-btn:hover:not(:disabled) {
            background-color: #C4644A;
        }

        .submit-btn:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="review-card">
        <h2 class="review-title">Оцените прошедшую встречу</h2>
        <p class="review-subtitle">Ваша оценка поможет нам формировать честный рейтинг</p>

        <form id="reviewForm">
            {% csrf_token %}
            
            <div class="rating-container" id="ratingContainer">
                </div>

            <textarea id="reviewComment" class="comment-area" placeholder="Напишите пару слов о встрече (необязательно)"></textarea>

            <button type="submit" id="submitBtn" class="submit-btn" disabled>Отправить оценку</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('ratingContainer');
            const submitBtn = document.getElementById('submitBtn');
            const reviewForm = document.getElementById('reviewForm');
            
            let selectedScore = 0;
            let ratingButtons = [];

            // Генерируем 10 кнопок
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.type = 'button'; // Важно, чтобы не отправлялась форма при клике
                btn.className = 'rating-btn';
                btn.textContent = i;
                btn.dataset.value = i;
                container.appendChild(btn);
                ratingButtons.push(btn);
            }

            // Логика наведения и клика
            ratingButtons.forEach((btn, index) => {
                // Наведение мыши
                btn.addEventListener('mouseenter', () => {
                    ratingButtons.forEach((b, i) => {
                        b.classList.toggle('hovered', i <= index);
                    });
                });

                // Уход мыши
                btn.addEventListener('mouseleave', () => {
                    ratingButtons.forEach(b => b.classList.remove('hovered'));
                });

                // Клик (выбор оценки)
                btn.addEventListener('click', () => {
                    selectedScore = index + 1;
                    
                    // Обновляем визуальное состояние
                    ratingButtons.forEach((b, i) => {
                        b.classList.toggle('active', i < selectedScore);
                    });
                    
                    // Активируем кнопку отправки
                    submitBtn.disabled = false;
                });
            });

            // Отправка формы (AJAX запрос в Django)
            reviewForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const comment = document.getElementById('reviewComment').value;
                const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

                // Блокируем кнопку от двойного клика
                submitBtn.disabled = true;
                submitBtn.textContent = 'Отправка...';

                // Здесь нужно указать URL вашей view в Django
                fetch('/rating/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({
                        score: selectedScore,
                        comment: comment,
                        // Используем шаблонизатор Django, чтобы вставить email нужного человека
                        target_email: '{{ target_user_email }}' 
                    })
                })
                .then(response => {
                    if (response.ok) {
                        alert('Спасибо за вашу оценку!');
                        window.location.href = '/home/'; // Редирект на главную
                    } else {
                        throw new Error('Ошибка сети');
                    }
                })
                .catch(error => {
                    alert('Произошла ошибка при отправке. Попробуйте еще раз.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Отправить оценку';
                });
            });
        });
    </script>
</body>
</html>
