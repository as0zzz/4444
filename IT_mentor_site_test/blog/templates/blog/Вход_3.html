<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --accent: #d16f53;
            --accent-dark: #b7583d;
            --ink: #1f1f1f;
            --muted: #675f5a;
            --surface: rgba(255, 252, 250, 0.94);
            --surface-soft: rgba(249, 240, 235, 0.88);
            --line: rgba(62, 38, 27, 0.12);
        }

        body {
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                linear-gradient(135deg, rgba(38, 24, 17, 0.24), rgba(255, 243, 236, 0.16)),
                url("{% static 'images/2.jpg' %}") center/cover no-repeat fixed;
        }

        .page {
            min-height: 100vh;
            padding: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .panel {
            width: min(100%, 780px);
            padding: 30px;
            border-radius: 32px;
            background: var(--surface);
            border: 1px solid var(--line);
            box-shadow: 0 24px 60px rgba(42, 22, 15, 0.16);
        }

        .panel-top {
            display: grid;
            gap: 20px;
            margin-bottom: 22px;
        }

        .panel-title h1 {
            font-size: clamp(32px, 4.5vw, 42px);
            line-height: 1;
            letter-spacing: -0.04em;
        }

        .role-switch {
            position: relative;
            display: inline-grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 6px;
            width: min(100%, 320px);
            border-radius: 0.5rem;
            background: rgba(209, 111, 83, 0.12);
        }

        .role-switch a {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            padding: 0 18px;
            border-radius: 0.5rem;
            text-decoration: none;
            color: var(--muted);
            font-weight: 700;
            transition: color 0.2s ease;
        }

        .role-switch::before {
            content: "";
            position: absolute;
            top: 6px;
            left: 6px;
            width: calc(50% - 6px);
            height: calc(100% - 12px);
            border-radius: 0.5rem;
            background: linear-gradient(135deg, var(--accent), #e18767);
            box-shadow: 0 10px 24px rgba(209, 111, 83, 0.26);
            transition: transform 0.25s ease;
        }

        .role-switch[data-role="intern"]::before {
            transform: translateX(100%);
        }

        .role-switch a.active {
            color: #fff;
        }

        .error {
            margin-bottom: 20px;
            padding: 14px 16px;
            border-radius: 0.5rem;
            background: rgba(196, 52, 52, 0.1);
            color: #a12626;
            font-size: 14px;
            line-height: 1.45;
        }

        form {
            display: grid;
            gap: 16px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        .field label {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .field input {
            width: 100%;
            min-height: 58px;
            padding: 0 20px;
            border-radius: 0.5rem;
            border: 1px solid rgba(42, 22, 15, 0.14);
            background: var(--surface-soft);
            font-size: 16px;
            color: var(--ink);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .field input:focus {
            outline: none;
            border-color: rgba(209, 111, 83, 0.75);
            box-shadow: 0 0 0 4px rgba(209, 111, 83, 0.14);
            background: #fff;
        }

        .consent {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 6px 2px 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .consent input {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: var(--accent-dark);
            flex-shrink: 0;
        }

        .submit-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 6px;
        }

        .submit-btn {
            min-width: 220px;
            min-height: 58px;
            padding: 0 22px;
            border: none;
            border-radius: 0.5rem;
            background: linear-gradient(135deg, var(--accent), #e18767);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 14px 30px rgba(209, 111, 83, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(209, 111, 83, 0.34);
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
        }

        .footer-link {
            margin-top: 18px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
        }

        .footer-link a {
            color: var(--ink);
            text-decoration: none;
            font-weight: 700;
        }

        .footer-link a:hover {
            color: var(--accent-dark);
        }

        @media (max-width: 760px) {
            .page {
                padding: 18px;
            }

            .panel {
                padding: 24px 18px;
                border-radius: 28px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .submit-row {
                align-items: stretch;
            }

            .submit-btn {
                width: 100%;
                min-width: 0;
            }

            .role-switch {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="panel">
            <div class="panel-top">
                <div class="panel-title">
                    <h1>Регистрация</h1>
                </div>

                <div class="role-switch" data-role="{{ role }}">
                    <a href="{% url 'open_3' %}?role=mentor" class="{% if role == 'mentor' %}active{% endif %}">Ментор</a>
                    <a href="{% url 'open_3' %}?role=intern" class="{% if role == 'intern' %}active{% endif %}">Стажёр</a>
                </div>
            </div>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{% url 'open_3' %}?role={{ role }}">
                {% csrf_token %}

                <div class="form-grid">
                    <div class="field">
                        <label for="name">Имя</label>
                        <input type="text" id="name" name="name" value="{{ request.POST.name }}" required>
                    </div>

                    <div class="field">
                        <label for="surname">Фамилия</label>
                        <input type="text" id="surname" name="surname" value="{{ request.POST.surname }}" required>
                    </div>

                    <div class="field full">
                        <label for="patronymic">Отчество</label>
                        <input type="text" id="patronymic" name="patronymic" value="{{ request.POST.patronymic }}">
                    </div>

                    <div class="field">
                        <label for="phone">Телефон</label>
                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            pattern="\+7\s?[\(]{0,1}\d{3}[\)]{0,1}\s?\d{3}[-]{0,1}\d{2}[-]{0,1}\d{2}"
                            placeholder="+7 (999) 123-45-67"
                            value="{{ request.POST.phone }}"
                            required
                        >
                    </div>

                    <div class="field">
                        <label for="email">Эл. почта</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" value="{{ request.POST.email }}" required>
                    </div>

                    <div class="field">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" name="pa" placeholder="Придумайте пароль" required>
                    </div>

                    <div class="field">
                        <label for="confirm">Подтверждение пароля</label>
                        <input type="password" id="confirm" name="confirm" placeholder="Повторите пароль" required>
                    </div>
                </div>

                <label class="consent" for="agree">
                    <input type="checkbox" id="agree" name="agree" required>
                    <span>Я даю согласие на обработку персональных данных и принимаю условия политики конфиденциальности.</span>
                </label>

                <div class="submit-row">
                    <button class="submit-btn" type="submit">Продолжить</button>
                </div>
            </form>

            <div class="footer-link">
                Уже есть аккаунт?
                <a href="{% url 'open_1' %}">Войти</a>
            </div>
        </section>
    </main>
</body>
</html>
