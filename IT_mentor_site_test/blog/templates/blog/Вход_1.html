<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --accent: #d16f53;
            --accent-dark: #b7583d;
            --ink: #1f1f1f;
            --muted: #675f5a;
            --surface: rgba(255, 252, 250, 0.94);
            --surface-soft: rgba(249, 240, 235, 0.88);
            --line: rgba(62, 38, 27, 0.12);
        }

        body {
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                linear-gradient(135deg, rgba(32, 22, 18, 0.24), rgba(255, 241, 233, 0.2)),
                url("{% static 'images/2.jpg' %}") center/cover no-repeat fixed;
        }

        .page {
            min-height: 100vh;
            padding: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .panel {
            width: min(100%, 470px);
            padding: 32px;
            border-radius: 32px;
            background: var(--surface);
            border: 1px solid var(--line);
            box-shadow: 0 22px 60px rgba(42, 22, 15, 0.18);
        }

        h1 {
            font-size: clamp(32px, 4.5vw, 42px);
            line-height: 1;
            letter-spacing: -0.04em;
        }

        .error {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 0.5rem;
            background: rgba(196, 52, 52, 0.1);
            color: #a12626;
            font-size: 14px;
            line-height: 1.45;
        }

        form {
            margin-top: 26px;
            display: grid;
            gap: 16px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field label {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .field input {
            width: 100%;
            min-height: 58px;
            padding: 0 20px;
            border-radius: 0.5rem;
            border: 1px solid rgba(42, 22, 15, 0.14);
            background: var(--surface-soft);
            color: var(--ink);
            font-size: 16px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .field input:focus {
            outline: none;
            border-color: rgba(209, 111, 83, 0.75);
            box-shadow: 0 0 0 4px rgba(209, 111, 83, 0.14);
            background: #fff;
        }

        .submit-btn {
            min-height: 58px;
            margin-top: 6px;
            border: none;
            border-radius: 0.5rem;
            background: linear-gradient(135deg, var(--accent), #e18767);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 14px 30px rgba(209, 111, 83, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(209, 111, 83, 0.34);
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
        }

        .bottom-link {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
            color: var(--muted);
        }

        .bottom-link a {
            color: var(--ink);
            text-decoration: none;
            font-weight: 700;
        }

        .bottom-link a:hover {
            color: var(--accent-dark);
        }

        @media (max-width: 560px) {
            .page {
                padding: 18px;
            }

            .panel {
                padding: 24px 18px;
                border-radius: 28px;
            }

            h1 {
                font-size: 34px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="panel">
            <h1>Вход</h1>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="field">
                    <label for="email">Эл. почта</label>
                    <input type="email" id="email" name="Email" placeholder="you@example.com" required>
                </div>

                <div class="field">
                    <label for="pa">Пароль</label>
                    <input type="password" id="pa" name="Pa" placeholder="Введите пароль" required>
                </div>

                <button class="submit-btn" type="submit">Войти</button>
            </form>

            <div class="bottom-link">
                Нет аккаунта?
                <a href="{% url 'open_3' %}">Зарегистрироваться</a>
            </div>
        </section>
    </main>
</body>
</html>
