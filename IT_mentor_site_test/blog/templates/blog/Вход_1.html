<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
   <meta charset="UTF-8">
   <title>Вход в систему</title>
   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       body {
           font-family: 'Inter', -apple-system, Helvetica, sans-serif;
           background: #000;
           overflow: hidden;
       }

       .container {
           min-height: 100vh;
           width: 100%;
           display: flex;
           align-items: flex-start;
           justify-content: center;
           position: relative;
           overflow: hidden;
           padding-top: 30px;
       }

       .background {
           position: absolute;
           inset: 0;
           background-image: url("{% static 'images/2.jpg' %}?v={{ STATIC_VERSION }}");
           background-size: cover;
           background-position: center;
           z-index: 0;
       }

       .overlay {
           position: absolute;
           inset: 0;
           background: linear-gradient(to right, rgba(255, 255, 255, 0.5) 0%, transparent 40%, transparent 100%);
           z-index: 1;
       }

       @media (min-width: 1024px) {
           .overlay {
               background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, transparent 100%);
           }
       }

       .content {
           position: relative;
           z-index: 10;
           width: 100%;
           max-width: 448px;
           padding: 24px;
           margin: 0 auto;
       }

       @media (min-width: 768px) {
           .content {
               padding: 32px;
           }
       }

       @media (min-width: 1024px) {
           .content {
               max-width: 512px;
               margin-left: 32px;
               margin-right: auto;
               padding: 0;
           }
       }

       .header {
           margin-bottom: 32px;
           text-align: center;
       }

       @media (min-width: 1024px) {
           .header {
               text-align: left;
               margin-bottom: 48px;
           }
       }

       .title {
           font-family: 'Inter', -apple-system, Helvetica, sans-serif;
           font-size: 50px;
           line-height: 1.3;
           color: black;
           font-weight: 400;
           text-align: center;
       }

       @media (min-width: 768px) {
           .title {
               font-size: 48px;
           }
       }

       @media (min-width: 1024px) {
           .title {
               font-size: 48px;
           }
       }

       .form {
           background: rgba(255, 255, 255, 0.7);
           border: 2px solid #000;
           border-radius: 24px;
           padding: 48px;
       }

       @media (min-width: 768px) {
           .form {
               padding: 40px;
           }
       }

       .form-group {
           margin-bottom: 24px;
       }

       @media (min-width: 768px) {
           .form-group {
               margin-bottom: 32px;
           }
       }

       .form-group:last-of-type {
           margin-bottom: 16px;
       }

       label {
           display: block;
           font-size: 28px;
           line-height: 1.3;
           color: #000;
           font-weight: 400;
           margin-bottom: 8px;
       }

       @media (min-width: 768px) {
           label {
               font-size: 28px;
               margin-bottom: 12px;
           }
       }

       input[type="email"],
       input[type="password"] {
           width: 100%;
           background: #ccc;
           border: 0;
           border-radius: 24px;
           padding: 12px 24px;
           font-size: 16px;
           font-family: 'Inter', sans-serif;
           transition: all 0.2s ease;
           color: #000;
           height: 48px;
       }

       @media (min-width: 768px) {
           input[type="email"],
           input[type="password"] {
               padding: 16px 24px;
               font-size: 18px;
               height: 56px;
           }
       }

       input[type="email"]:focus,
       input[type="password"]:focus {
           outline: 2px solid #000;
           outline-offset: 2px;
       }

       input::placeholder {
           color: rgba(0, 0, 0, 0.5);
       }

       .password-wrapper {
           position: relative;
           display: flex;
           align-items: center;
       }

       .password-wrapper input {
           padding-right: 48px;
       }

       .toggle-password {
           position: absolute;
           right: 12px;
           background: none;
           border: none;
           cursor: pointer;
           color: rgba(0, 0, 0, 0.5);
           padding: 0;
           display: flex;
           align-items: center;
           justify-content: center;
           width: 24px;
           height: 24px;
           flex-shrink: 0;
       }

       .toggle-password:hover {
           color: #000;
       }

       .toggle-password svg {
           width: 20px;
           height: 20px;
           display: block;
       }

       .button-wrapper {
           display: flex;
           justify-content: center;
           padding-top: 16px;
       }

       button[type="button"] {
           border: 1px solid #000;
           border-radius: 24px;
           padding: 12px 32px;
           font-size: 20px;
           font-family: 'Inter', sans-serif;
           color: #000;
           background: transparent;
           cursor: pointer;
           font-weight: 400;
           transition: all 0.2s ease;
       }

       @media (min-width: 768px) {
           button[type="button"] {
               padding: 12px 40px;
               font-size: 30px;
           }
       }

       button[type="button"]:hover {
           background: #000;
           color: #fff;
       }

       button[type="submit"] {
           border: 1px solid #000;
           border-radius: 24px;
           padding: 12px 32px;
           font-size: 20px;
           font-family: 'Inter', sans-serif;
           color: #000;
           background: transparent;
           cursor: pointer;
           font-weight: 400;
           transition: all 0.2s ease;
       }

       @media (min-width: 768px) {
           button[type="submit"] {
               padding: 12px 40px;
               font-size: 30px;
           }
       }

       button[type="submit"]:hover {
           background: #000;
           color: #fff;
       }

       .signup {
           margin-top: 32px;
           text-align: center;
       }

       @media (min-width: 1024px) {
           .signup {
               text-align: left;
               margin-top: 40px;
           }
       }

       .signup-button {
           background: none;
           border: none;
           font-size: 18px;
           font-family: 'Inter', -apple-system, Helvetica, sans-serif;
           color: #000;
           cursor: pointer;
           font-weight: 400;
           transition: all 0.2s ease;
           padding: 0;
       }

       @media (min-width: 768px) {
           .signup-button {
               font-size: 20px;
           }
       }
   </style>
</head>
<body>
   <div class="container">
       <div class="background"></div>
       <div class="overlay"></div>

       <div class="content">
           <div class="header">
               <h1 class="title">Вход в систему</h1>
           </div>

           <form method="POST" class="form">
               {% csrf_token %}
               <div class="form-group">
                   <label>Эл. почта</label>
                   <input type="email" name="Email" id="email"  required>
               </div>

               <div class="form-group">
                   <label>Пароль</label>
                       <input type="password" name="Pa" id="pa"  required>
               </div>

               <div class="button-wrapper">
                   <button type="submit">ОК</button>
               </div>
           </form>

           <div class="signup">
               <button type="button" class="signup-button" onclick="window.location.href='/open_2/'">Зарегистрироваться</button>
           </div>
       </div>
   </div>

   <script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('form');
    if (!form) {
        console.error('Форма не найдена!');
        return;
    }

    // Убеждаемся, что метод POST
    if (form.method !== 'post') {
        console.warn('Меняем метод с', form.method, 'на POST');
        form.method = 'POST';
    }

    // Проверяем кнопку
    let submitBtn = form.querySelector('button[type="submit"], input[type="submit"]');
    if (!submitBtn) {
        console.warn('Нет кнопки submit, создаем');
        submitBtn = document.createElement('button');
        submitBtn.type = 'submit';
        submitBtn.textContent = 'Войти';
        submitBtn.className = 'btn btn-primary';
        form.appendChild(submitBtn);
    }

    // Убеждаемся, что у полей есть name
    const emailInput = form.querySelector('input[type="email"]');
    if (emailInput && !emailInput.name) {
        console.warn('Добавляем name="email"');
        emailInput.name = 'email';
    }

    const passInput = form.querySelector('input[type="password"]');
    if (passInput && !passInput.name) {
        console.warn('Добавляем name="pa"');
        passInput.name = 'pa';
    }

    // Тестовая отправка
    form.addEventListener('submit', function(e) {
        console.log('Форма отправляется!');
        console.log('Email:', this.querySelector('[name="Email"]')?.value);
        console.log('Pa:', this.querySelector('[name="Pa"]')?.value);
    });
});



//Новогодний снег
       setTimeout(function(){
          var s=document.createElement('div');
          s.id='snow';
          s.style='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden;';
          document.body.appendChild(s);

          var style=document.createElement('style');
          style.textContent='#snow .f{position:absolute;background:white;border-radius:50%;top:-10px;animation:fall linear infinite}@keyframes fall{0%{opacity:0;transform:translateY(0)}10%{opacity:0.7}90%{opacity:0.6}100%{opacity:0;transform:translateY(calc(100vh + 20px)) translateX(var(--x))}}';
          document.head.appendChild(style);

          for(var i=0;i<80;i++){
            var f=document.createElement('div');
            f.className='f';
            f.style.cssText='width:'+(2+Math.random()*5)+'px;height:'+(2+Math.random()*5)+'px;left:'+Math.random()*100+'vw;--x:'+(Math.random()*80-40)+'px;animation-duration:'+(10+Math.random()*15)+'s;animation-delay:'+(Math.random()*10)+'s;opacity:'+(0.4+Math.random()*0.5)+';';
            s.appendChild(f);
          }
        }, 500);
   </script>
</body>
</html>
